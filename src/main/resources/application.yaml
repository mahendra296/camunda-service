spring:
  application:
    name: camunda-service
  profiles:
    active: local

  # ── Database ────────────────────────────────────────────────────────────────
  datasource:
    url: ${DATASOURCE_URL}
    driver-class-name: ${DATASOURCE_DRIVER_CLASS}
    username: ${DATASOURCE_USERNAME}
    password: ${DATASOURCE_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_batch_fetch_size: 50

  liquibase:
    change-log: classpath:/db/changelog-master.xml
    enabled: false

server:
  port: 8081

# ── IDP ──────────────────────────────────────────────────────────────────────
# ExtractPdfRegionWorker shells out to pdftoppm (poppler-utils). Override with an absolute
# path via IDP_PDFTOPPM_PATH if it's not on this process's PATH (e.g. right after installing
# poppler — a PATH env var update doesn't apply to an already-running process).
idp:
  pdftoppm-path: ${IDP_PDFTOPPM_PATH:pdftoppm}
  crop-region:
    default-width: ${IDP_CROP_DEFAULT_WIDTH:300}
    default-height: ${IDP_CROP_DEFAULT_HEIGHT:150}

# ── Camunda 8 Local (Self-Managed) ───────────────────────────────────────────
# The docker-compose-full.yaml stack (camunda-distributions/docker-compose/versions/camunda-8.9)
# secures the orchestration cluster with OIDC via Keycloak. Values come from the active profile
# (see application-local.yml), sourced from that stack's .env (ORCHESTRATION_CLIENT_ID / SECRET).
camunda:
  client:
    mode: selfmanaged
    grpc-address: grpc://${ZEEBE_HOST:localhost}:26500
    rest-address: http://${ZEEBE_HOST:localhost}:8080
    auth:
      method: oidc
      client-id: ${CAMUNDA_CLIENT_ID}
      client-secret: ${CAMUNDA_CLIENT_SECRET}
      token-url: ${CAMUNDA_TOKEN_URL}
      audience: ${CAMUNDA_TOKEN_AUDIENCE}

