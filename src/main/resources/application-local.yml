# ── Database ──────────────────────────────────────────────────────────────────
DATASOURCE_URL: jdbc:postgresql://localhost:5432/camundadb
DATASOURCE_DRIVER_CLASS: org.postgresql.Driver
DATASOURCE_USERNAME: postgres
DATASOURCE_PASSWORD: root

# ── IDP ──────────────────────────────────────────────────────────────────────
# Absolute path so it works regardless of whether this shell picked up the winget PATH update yet.
IDP_PDFTOPPM_PATH: C:\Users\mahendra\AppData\Local\Microsoft\WinGet\Packages\oschwartz10612.Poppler_Microsoft.Winget.Source_8wekyb3d8bbwe\poppler-25.07.0\Library\bin\pdftoppm.exe

# ── Camunda 8 client OIDC auth ───────────────────────────────────────────────
# From camunda-distributions/docker-compose/versions/camunda-8.9/.env
# (ORCHESTRATION_CLIENT_ID / ORCHESTRATION_CLIENT_SECRET)
CAMUNDA_CLIENT_ID: orchestration
CAMUNDA_CLIENT_SECRET: secret
CAMUNDA_TOKEN_URL: http://localhost:18080/auth/realms/camunda-platform/protocol/openid-connect/token
CAMUNDA_TOKEN_AUDIENCE: orchestration-api

spring:
  liquibase:
    enabled: true

